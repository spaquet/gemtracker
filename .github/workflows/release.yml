name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.15.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Create Sentry Release
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "Creating Sentry release for version: $VERSION"
          curl -sL https://sentry.io/get-cli/ | bash

          # Create release in Sentry
          sentry-cli releases new "$VERSION"
          echo "✓ Release created"

          # Upload source files for code context in error views
          sentry-cli releases files upload-sourcemaps . \
            --release "$VERSION" \
            --ignore "dist,build,.git,.github" \
            --ignore-flat "go.mod,go.sum,Makefile,.goreleaser.yml,LICENSE" \
            --rewrite
          echo "✓ Source files uploaded"

          # Link commits to the release for better context
          sentry-cli releases set-commits "$VERSION" --auto
          echo "✓ Commits linked"

          # Finalize the release
          sentry-cli releases finalize "$VERSION"
          echo "✓ Release finalized and ready for tracking"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: gemtracker
          SENTRY_PROJECT: gemtracker-tui
